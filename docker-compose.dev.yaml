version: '3.8'

# Development configuration with hot reloading
services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: echolsfrench-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: echolsfrench
      MYSQL_USER: echolsfrench
      MYSQL_PASSWORD: devpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - echolsfrench-dev-network

networks:
  echolsfrench-dev-network:
    driver: bridge

volumes:
  mysql_data_dev:
